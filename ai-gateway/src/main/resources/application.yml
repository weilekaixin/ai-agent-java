server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: ai-gateway
  profiles:
    active: @profiles.active@

# 安全配置
security:
  # 不校验白名单
  ignore:
    whites:
      - /api/chat/**
# 打印请求参数
api-decrypt:
  enabled: true
--- # nacos 配置
spring:
  cloud:
    gateway:
      # 打印请求日志(自定义)
      requestLog: true
      server:
        webflux:
          discovery:
            locator:
              lowerCaseServiceId: true
              enabled: true
          routes:
            # AI Agent 服务
            - id: ai-agent
              uri: lb://ai-agent
              predicates:
                - Path=/api/chat/**
              filters:
                - StripPrefix=1
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        group: @nacos.discovery.group@
        namespace: ${spring.profiles.active}
      config:
        group: @nacos.config.group@
        namespace: ${spring.profiles.active}
  config:
    import:
      - optional:file:.env[.properties]
      - optional:nacos:application-common.yml
      - optional:nacos:${spring.application.name}.yml
